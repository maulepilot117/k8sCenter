# k8sCenter Helm Chart Values
# See values.schema.json for validation rules.

replicaCount: 1  # Safe to increase with PostgreSQL (no single-writer constraint)

nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []
# - name: ghcr-pull-secret

# -- Security posture (P2-8 of the 2026-05-22 security audit)
#
# Set insecureExposureAcknowledged=true to allow plaintext-exposed
# deployment configurations: service.type=LoadBalancer / NodePort,
# ingress.enabled=true without ingress.tls, or backend.config.dev=true
# combined with any externally-reachable service. The chart refuses to
# render any of those modes by default — exposing the backend without
# TLS leaks access tokens, refresh tokens, setup tokens, and all API
# traffic in the clear.
#
# Acknowledge the risk only when TLS termination happens upstream
# (managed LB with cert, service mesh gateway, etc.) and the network
# path stays inside a trusted boundary.
security:
  insecureExposureAcknowledged: false

# -- Backend (Go API server)
backend:
  image:
    repository: kubecenter-backend
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 256Mi
  goMemLimit: "230MiB"    # GOMEMLIMIT — set to ~90% of memory limit
  config:
    dev: false
    logLevel: info     # debug, info, warn, error
    logFormat: json     # json, text
    clusterID: local

# -- Frontend (Deno/Fresh SSR)
frontend:
  enabled: true
  image:
    repository: kubecenter-frontend
    tag: ""  # Defaults to appVersion
    pullPolicy: IfNotPresent
  port: 8000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Service Account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Services
service:
  type: ClusterIP
  port: 8080
  frontendPort: 8000

# -- Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example for cert-manager:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: k8scenter.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: k8scenter-tls
  #   hosts:
  #     - k8scenter.local

# -- Authentication
auth:
  # JWT signing secret. Auto-generated on first install if empty.
  # Stored in a k8s Secret and survives helm upgrades.
  jwtSecret: ""
  # Setup token for POST /api/v1/setup/init. When empty AND
  # backend.config.dev=false, the chart auto-generates a 48-char token
  # at install time and persists it in the app Secret (survives helm
  # upgrade). In dev mode the backend allows token-free setup ONLY
  # from a loopback peer; non-loopback dev installs still require a
  # configured token. See finding P1-1 in plans/security-audit-2026-05-22.md.
  setupToken: ""
  # OIDC providers (array). Each entry maps to config.OIDCConfig.
  oidc: []
  # - id: google
  #   displayName: "Google"
  #   issuerURL: "https://accounts.google.com"
  #   clientID: ""
  #   clientSecret: ""
  #   redirectURL: "https://k8scenter.example.com/api/v1/auth/oidc/google/callback"
  #   scopes: ["openid", "email", "profile"]
  #   usernameClaim: "email"
  #   groupsClaim: "groups"
  #   groupsPrefix: ""
  #   allowedDomains: []
  # LDAP providers (array). Each entry maps to config.LDAPConfig.
  ldap: []
  # - id: corp-ad
  #   displayName: "Corporate AD"
  #   url: "ldaps://ldap.corp.com:636"
  #   bindDN: "CN=svc-k8scenter,OU=ServiceAccounts,DC=corp,DC=com"
  #   bindPassword: ""
  #   userBaseDN: "DC=corp,DC=com"
  #   userFilter: "(sAMAccountName={0})"
  #   groupBaseDN: "DC=corp,DC=com"
  #   groupFilter: "(member={0})"
  #   groupNameAttr: "cn"
  #   usernameMapAttr: "sAMAccountName"
  #   groupsPrefix: "ldap:"

# -- Database (PostgreSQL)
postgresql:
  enabled: false          # Set true to deploy Bitnami PostgreSQL subchart
  auth:
    username: k8scenter
    password: ""          # Auto-generated if empty
    database: k8scenter
    existingSecret: ""    # Use existing k8s Secret for passwords
  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: ""

# -- External Database (used when postgresql.enabled=false and you have your own PostgreSQL)
externalDatabase:
  host: ""
  port: 5432
  user: k8scenter
  password: ""
  database: k8scenter
  existingSecret: ""      # k8s Secret with key "password"
  sslmode: require

# -- Cilium agent deep diagnostics (requires pods/exec RBAC)
ciliumAgent:
  # -- Enable exec-based diagnostics for WireGuard details, ClusterMesh, Envoy stats
  execEnabled: false
  # -- Max concurrent pod execs (default: 10). With 5s per-pod timeout and 30s outer timeout,
  # max ~(maxConcurrent * 6) nodes can be collected per cycle.
  maxConcurrent: 10

# -- Alerting
alerting:
  enabled: false
  webhookToken: ""      # Auto-generated if empty
  retentionDays: 30
  rateLimit: 120        # Max emails per hour
  recipients: []
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
    tlsInsecure: false

# -- Monitoring
monitoring:
  deploy: false          # Set true to deploy kube-prometheus-stack subchart
  namespace: ""          # Namespace hint for discovery (empty = search all)
  prometheus:
    url: ""              # Override auto-discovery
  grafana:
    url: ""              # Override auto-discovery
    # WARNING: monitoring.grafana.apiToken is DEPRECATED and will be removed in
    # v2.0. The single-token form silently degrades to viewer-only mode —
    # dashboard provisioning is DISABLED when this field is set without the
    # split tokens below. Use viewerTokenSecret + provisioningTokenSecret
    # instead so KubeCenter can both render dashboards (viewer) and provision
    # them on startup (provisioning). NOTES.txt prints an explicit warning at
    # install/upgrade time when this field is non-empty.
    apiToken: ""         # DEPRECATED — see WARNING above; prefer viewerTokenSecret + provisioningTokenSecret.
    viewerTokenSecret:
      name: ""           # Kubernetes Secret name containing the Grafana viewer token (KUBECENTER_MONITORING_GRAFANAVIEWERTOKEN)
      key: ""            # Key within the Secret (e.g. grafana-viewer-token)
    provisioningTokenSecret:
      name: ""           # Kubernetes Secret name containing the Grafana provisioning token (KUBECENTER_MONITORING_GRAFANAPROVISIONINGTOKEN)
      key: ""            # Key within the Secret (e.g. grafana-provisioning-token)

# -- CORS
cors:
  allowedOrigins: []     # Auto-set from ingress host if empty

# -- Network Policy
networkPolicy:
  enabled: true
  ingressNamespace: "ingress-nginx"   # Namespace of the ingress controller (for backend ingress rule)
  # Backend egress tuning (P2-7 of the 2026-05-22 security audit). The
  # default rules restrict egress to kube-dns, in-cluster PostgreSQL +
  # Prometheus + Grafana pods (by standard label conventions), and any
  # IP route that's NOT link-local/metadata (169.254.0.0/16). Tune the
  # knobs below when your cluster diverges from these defaults — for
  # example, an out-of-cluster Postgres needs its CIDR in
  # extraAllowedCIDRs, and a private monitoring stack needs its CIDR in
  # monitoringCIDRs.
  egress:
    # kube-dns location. The defaults match upstream Kubernetes; clusters
    # that run CoreDNS in a different namespace (e.g. `coredns`) or
    # under a different pod label must override.
    dnsNamespace: "kube-system"
    dnsPodLabel: "kube-dns"
    # Allowlist of CIDRs that hold the Kubernetes API server endpoints.
    # Typical values: the control-plane node CIDR (bare-metal), the
    # service CIDR (most managed clusters route the apiserver via the
    # default/kubernetes Service VIP), or a single VIP /32. When empty,
    # falls back to 0.0.0.0/0 minus link-local/metadata.
    kubernetesApiCIDRs: []
    # - 10.96.0.1/32
    # CIDRs that hold externally-deployed Prometheus / Grafana / similar.
    # Leave empty when monitoring runs in-cluster (the default rules
    # already cover the subchart pods via labelSelector).
    monitoringCIDRs: []
    # - 10.10.20.0/24
    # CIDRs that hold LDAP / Active Directory servers. Only takes effect
    # when auth.ldap is configured. When empty, falls back to 0.0.0.0/0
    # minus link-local/metadata on ports 389 + 636.
    ldapCIDRs: []
    # - 192.168.10.10/32
    # Extra CIDRs to allow on common HTTPS / PostgreSQL ports (80, 443,
    # 5432). Use for out-of-cluster Postgres, internal mirrors, or other
    # backend dependencies not covered above.
    extraAllowedCIDRs: []
    # - 10.20.30.0/24
    # Additional ranges to block from every ipBlock egress rule (appended
    # to the universal link-local/metadata blocklist). Use for internal
    # management VLANs you never want the backend to reach.
    extraBlockedCIDRs: []
    # - 192.168.100.0/24

# -- Subchart overrides (only when monitoring.deploy=true)
monitoring-stack:
  alertmanager:
    enabled: false
  grafana:
    enabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
    grafana.ini:
      security:
        allow_embedding: true
      auth.proxy:
        enabled: true
        header_name: X-WEBAUTH-USER
  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

# -- RBAC opt-ins. Default chart has NO impersonation grant and NO
# cluster-wide secret read — finding P1-2 of the 2026-05-22 security audit.
# Operators that need either capability opt in explicitly.
rbac:
  # When true, render kubecenter-impersonator ClusterRole + binding with
  # the named user/group allowlists. Without this, the backend can't
  # forward k8s impersonation headers — meaning all per-user RBAC
  # checks fall through to the SA's own permissions (which are far
  # narrower than the cluster admin overreach the old chart allowed).
  impersonationEnabled: false
  allowedImpersonateUsers: []
  # - alice@example.com
  allowedImpersonateGroups: []
  # - cluster-admins
  allowedImpersonateServiceAccounts: []
  # - default/my-sa
  # When non-empty, render kubecenter-secrets-reader ClusterRole AND
  # bind it via RoleBinding in each listed namespace. Without this,
  # the UI's secret-reveal feature returns Forbidden for tenants
  # outside the install namespace.
  secretsReaderNamespaces: []
  # - team-a
  # - team-b

# -- Mobile app — Universal Link domain hosting (optional)
#
# When operators run the mobile app and want to use Universal Links
# (HTTPS deep links instead of the k8scenter:// custom scheme), set
# `mobile.universalLinkDomain` to the public host they operate the
# k8sCenter web frontend on. The chart will then expose two static
# files at that host:
#   - /.well-known/apple-app-site-association  (iOS)
#   - /.well-known/assetlinks.json             (Android)
#
# Both files are required for the mobile OS to recognize HTTPS links to
# that host as belonging to the k8sCenter app. When `domain` is empty,
# the template emits nothing and the mobile app falls back to the
# `k8scenter://` custom scheme.
mobile:
  universalLinkDomain: ""  # e.g., "kubecenter.example.com"
  # Apple Developer Team ID + iOS bundle identifier — both required
  # for the apple-app-site-association payload. Find the team ID in
  # Apple Developer → Membership.
  iosTeamId: ""             # e.g., "ABCDE12345"
  iosBundleId: "io.kubecenter.kubecenter"
  # Android: SHA-256 fingerprint of the upload signing key's
  # certificate, in the colon-separated hex format Play returns
  # (`keytool -list -v -keystore <keystore>` shows it). Must match
  # the cert used to sign the AAB Fastlane uploads.
  androidPackageName: "io.kubecenter.kubecenter"
  androidSha256CertFingerprint: ""  # e.g., "AB:CD:EF:..."
  # Distroless nginx image for the well-known pod. Defaults to
  # Chainguard's free public distroless build. Operators behind
  # air-gapped registries should mirror to their own internal
  # registry and override this value.
  wellKnownImage: ""  # empty → cgr.dev/chainguard/nginx:latest
