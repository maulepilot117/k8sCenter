{{- include "kubecenter.validatePlaceholders" . }}
{{- if .Values.networkPolicy.enabled }}
---
# Backend NetworkPolicy: allow ingress from frontend/ingress, allow egress to k8s API + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from frontend pods in this namespace
    - from:
        - podSelector:
            matchLabels:
              {{- include "kubecenter.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: frontend
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
    {{- if .Values.ingress.enabled }}
    # Allow traffic from ingress controller namespace only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
    {{- end }}
  egress:
    # Allow all TCP/UDP egress to required ports (DNS, k8s API, PostgreSQL, Prometheus, Grafana, Hubble Relay)
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 5432
          protocol: TCP
        - port: 6443
          protocol: TCP
        - port: 9090
          protocol: TCP
        - port: 3000
          protocol: TCP
    {{- if .Values.auth.ldap }}
    # LDAP/LDAPS (only when LDAP providers are configured)
    - ports:
        - port: 389
          protocol: TCP
        - port: 636
          protocol: TCP
    {{- end }}
---
{{- if .Values.frontend.enabled }}
# Frontend NetworkPolicy: allow ingress from ingress controller, egress only to backend + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.frontendFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: {{ .Values.frontend.port }}
          protocol: TCP
    # Allow traffic from within the release namespace (e.g. for service mesh, probes)
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.frontend.port }}
          protocol: TCP
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Backend service only
    - to:
        - podSelector:
            matchLabels:
              {{- include "kubecenter.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backend
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
{{- end }}
---
{{- if .Values.mobile.universalLinkDomain }}
# Well-known NetworkPolicy: gated on mobile.universalLinkDomain since
# the well-known Pod (Apple AASA + Android assetlinks.json) only renders
# when Universal Links are enabled. Allow ingress from the ingress
# controller namespace, egress restricted to DNS only — the pod serves
# static files from a ConfigMap and never reaches outbound.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.fullname" . }}-well-known
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
    app.kubernetes.io/component: well-known
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: well-known
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: 8080
          protocol: TCP
    {{- end }}
  egress:
    # DNS only — well-known Pod serves static ConfigMap content and
    # has no other outbound dependencies.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
{{- end }}
