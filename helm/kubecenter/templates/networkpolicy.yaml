{{- include "kubecenter.validatePlaceholders" . }}
{{- if .Values.networkPolicy.enabled }}
{{- /*
Phase 4 of the 2026-05-22 security audit (P2-7) tightened backend egress.
The previous policy was port-only — anything in the cluster, in the LAN,
or on the public internet that happened to listen on 443/5432/6443/9090
was reachable. The current policy adds structured `to:` selectors for the
known destinations (kube-dns, in-namespace PostgreSQL, in-cluster
Prometheus/Grafana when the subchart is deployed) plus IP allowlists for
the cluster's Kubernetes API and any externally-configured monitoring
endpoints. Every IP-based egress rule carries `except` blocks for
link-local (169.254.0.0/16) and metadata IPs so a compromised backend
pod can't pivot to cloud instance-metadata services for IAM credential
theft. Tunable via the `networkPolicy.egress.*` value tree.
*/}}
{{- $egress := .Values.networkPolicy.egress | default dict }}
{{- $dnsNs := $egress.dnsNamespace | default "kube-system" }}
{{- $dnsLabel := $egress.dnsPodLabel | default "kube-dns" }}
{{- $apiCIDRs := $egress.kubernetesApiCIDRs | default (list) }}
{{- $monitorCIDRs := $egress.monitoringCIDRs | default (list) }}
{{- $ldapCIDRs := $egress.ldapCIDRs | default (list) }}
{{- $extraCIDRs := $egress.extraAllowedCIDRs | default (list) }}
{{- /*
$blockedRanges is the universal SSRF blocklist appended as `except`
entries to every `ipBlock` egress rule. Covers link-local (which
includes the 169.254.169.254 cloud metadata endpoint), IPv6
link-local, and IPv4-mapped-IPv6 link-local. Operators can extend via
`networkPolicy.egress.extraBlockedCIDRs` (for example to also block
internal management VLANs or known-sensitive RFC1918 ranges).
*/}}
{{- $blockedRanges := concat (list "169.254.0.0/16") ($egress.extraBlockedCIDRs | default (list)) }}
---
# Backend NetworkPolicy: allow ingress from frontend/ingress, allow egress
# only to structured destinations (kube-dns, in-cluster PostgreSQL +
# observability, configured external CIDRs). Metadata/link-local ranges
# are explicitly blocked from every IP egress rule.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from frontend pods in this namespace
    - from:
        - podSelector:
            matchLabels:
              {{- include "kubecenter.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: frontend
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
    {{- if .Values.ingress.enabled }}
    # Allow traffic from ingress controller namespace only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
    {{- end }}
  egress:
    # --- DNS — kube-dns (or equivalent) in $dnsNs only ---
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dnsNs }}
          podSelector:
            matchLabels:
              k8s-app: {{ $dnsLabel }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # --- Kubernetes API server ---
    # When $apiCIDRs is configured (typical: cluster control-plane VIP or
    # the API service CIDR), restrict to those CIDRs. Otherwise fall back
    # to port-only (still blocking link-local/metadata via `except`).
    {{- if $apiCIDRs }}
    - to:
        {{- range $apiCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
            except:
              {{- range $blockedRanges }}
              - {{ . | quote }}
              {{- end }}
        {{- end }}
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- else }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- range $blockedRanges }}
              - {{ . | quote }}
              {{- end }}
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    {{- end }}
    # --- In-cluster PostgreSQL (subchart pods) ---
    # Targets the kube-prometheus-stack-shaped label conventions used by
    # most Helm-deployed Postgres operators (bitnami, CrunchyData). When
    # operators run PostgreSQL out of cluster, $extraAllowedCIDRs covers
    # the route.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - port: 5432
          protocol: TCP
    # --- In-cluster Prometheus + Grafana (subchart pods) ---
    # `app.kubernetes.io/name` covers both the kube-prometheus-stack
    # subchart and standalone Prometheus/Grafana installs that follow
    # the standard label conventions.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - port: 9090
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
      ports:
        - port: 3000
          protocol: TCP
    {{- if $monitorCIDRs }}
    # --- External monitoring endpoints (operator-configured) ---
    # When Prometheus/Grafana live outside the cluster, list their VIPs
    # here so the backend can reach them while still blocking link-local
    # and metadata IPs.
    - to:
        {{- range $monitorCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
            except:
              {{- range $blockedRanges }}
              - {{ . | quote }}
              {{- end }}
        {{- end }}
      ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 3000
          protocol: TCP
        - port: 9090
          protocol: TCP
    {{- end }}
    {{- if .Values.auth.ldap }}
    # --- LDAP / LDAPS (only when LDAP providers are configured) ---
    {{- if $ldapCIDRs }}
    - to:
        {{- range $ldapCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
            except:
              {{- range $blockedRanges }}
              - {{ . | quote }}
              {{- end }}
        {{- end }}
      ports:
        - port: 389
          protocol: TCP
        - port: 636
          protocol: TCP
    {{- else }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- range $blockedRanges }}
              - {{ . | quote }}
              {{- end }}
      ports:
        - port: 389
          protocol: TCP
        - port: 636
          protocol: TCP
    {{- end }}
    {{- end }}
    {{- if $extraCIDRs }}
    # --- Extra operator-configured CIDRs (e.g. external Postgres,
    # backup targets, internal mirrors). Still excludes metadata IPs. ---
    - to:
        {{- range $extraCIDRs }}
        - ipBlock:
            cidr: {{ . | quote }}
            except:
              {{- range $blockedRanges }}
              - {{ . | quote }}
              {{- end }}
        {{- end }}
      ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 5432
          protocol: TCP
    {{- end }}
---
{{- if .Values.frontend.enabled }}
# Frontend NetworkPolicy: allow ingress from ingress controller, egress only to backend + DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.frontendFullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: {{ .Values.frontend.port }}
          protocol: TCP
    # Allow traffic from within the release namespace (e.g. for service mesh, probes)
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.frontend.port }}
          protocol: TCP
  egress:
    # DNS — kube-dns only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dnsNs }}
          podSelector:
            matchLabels:
              k8s-app: {{ $dnsLabel }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Backend service only
    - to:
        - podSelector:
            matchLabels:
              {{- include "kubecenter.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backend
      ports:
        - port: {{ .Values.backend.port }}
          protocol: TCP
{{- end }}
---
{{- if .Values.mobile.universalLinkDomain }}
# Well-known NetworkPolicy: gated on mobile.universalLinkDomain since
# the well-known Pod (Apple AASA + Android assetlinks.json) only renders
# when Universal Links are enabled. Allow ingress from the ingress
# controller namespace, egress restricted to DNS only — the pod serves
# static files from a ConfigMap and never reaches outbound.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kubecenter.fullname" . }}-well-known
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
    app.kubernetes.io/component: well-known
spec:
  podSelector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: well-known
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.ingress.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: 8080
          protocol: TCP
    {{- end }}
  egress:
    # DNS only — kube-dns only.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dnsNs }}
          podSelector:
            matchLabels:
              k8s-app: {{ $dnsLabel }}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
{{- end }}
