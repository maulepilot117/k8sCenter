apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubecenter.fullname" . }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
rules:
  # Impersonation — allows backend to impersonate users for RBAC enforcement
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
  # Read access for informers (service account's own permissions)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      # secrets are fetched on-demand via impersonated client, not cached in informer
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - events
      - resourcequotas
      - limitranges
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # RBAC viewer (read-only)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  # Storage — CSI drivers, storage classes (informer-cached, cluster-scoped)
  - apiGroups: ["storage.k8s.io"]
    resources:
      - csidrivers
      - storageclasses
      - csinodes
    verbs: ["get", "list", "watch"]
  # VolumeSnapshot CRDs (dynamic client, conditional on CRD existence)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotclasses
    verbs: ["get", "list"]
  # API discovery for CNI/CSI CRD detection
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*"]
    verbs: ["get"]
  # Monitoring discovery — check for Prometheus Operator CRDs and resources
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "prometheuses"]
    verbs: ["list", "get"]
  # Admission webhooks (read-only)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    verbs: ["get", "list", "watch"]
  # Cilium CRDs (dynamic client, conditional on CRD existence)
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumnetworkpolicies
      - ciliumbgpclusterconfigs
      - ciliumbgppeerconfigs
      - ciliumbgpnodeconfigs
      - ciliumnodes
      - ciliumendpoints
    verbs: ["get", "list", "watch"]
  # GitOps CRDs (dynamic informers for real-time WebSocket updates)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["list", "watch"]
  # Policy CRDs (dynamic informers for real-time WebSocket updates)
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies", "policies"]
    verbs: ["list", "watch"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["list", "watch"]
  - apiGroups: ["templates.gatekeeper.sh"]
    resources: ["constrainttemplates"]
    verbs: ["list", "watch"]
  # Service Mesh CRDs — Istio (networking + security) and Linkerd
  # (linkerd.io + policy.linkerd.io). The discoverer + cache layer in
  # `internal/servicemesh` runs as the service account: it lists CRDs
  # cluster-wide on a 30s cycle, then handlers apply per-user RBAC via
  # SelfSubjectAccessReview before returning data. Detail reads and the
  # topology overlay's per-user filtering use the impersonated client
  # — no SA grant needed for those paths.
  - apiGroups: ["networking.istio.io"]
    resources:
      - virtualservices
      - destinationrules
      - gateways
      - serviceentries
    verbs: ["list", "watch"]
  - apiGroups: ["security.istio.io"]
    resources:
      - peerauthentications
      - authorizationpolicies
    verbs: ["list", "watch"]
  - apiGroups: ["linkerd.io"]
    resources:
      - serviceprofiles
    verbs: ["list", "watch"]
  - apiGroups: ["policy.linkerd.io"]
    resources:
      - servers
      - httproutes
      - authorizationpolicies
      - meshtlsauthentications
    verbs: ["list", "watch"]
  # External Secrets Operator (ESO) CRDs — explicit list/watch grants for
  # the discoverer + 30s cache layer in `internal/externalsecrets`. Detail
  # reads use the impersonated client (which the API server RBACs against
  # the requesting user), so no `get` grant is needed here. Write actions
  # (force-sync, bulk refresh — Phase E) impersonate as well.
  - apiGroups: ["external-secrets.io"]
    resources:
      - externalsecrets
      - clusterexternalsecrets
      - secretstores
      - clustersecretstores
      - pushsecrets
    verbs: ["list", "watch"]
  # core/secrets get/list — required by the Phase C ESO sync-history poller
  # to compute key-level diff between successive sync attempts. The poller
  # has no requesting-user context (it runs as the platform SA), so it must
  # read synced Secret keys via the SA. This expands the SA's cluster-wide
  # privilege to read every Secret's key-set (values are NEVER stored or
  # logged — only key names appear in the diff). Operators in stricter
  # environments can remove this rule; the diff feature degrades to
  # "outcome only, no key-set" but the timeline + drift detection +
  # alerting all continue to work.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # CRD discovery — list/watch CustomResourceDefinitions for Extensions Hub
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  # CRD instance counts — service account lists instances for cached counts
  # displayed on the Extensions Hub. Actual CRUD uses impersonated client.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["list"]
  # SelfSubjectAccessReview for RBAC filtering
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
{{- if .Values.ciliumAgent.execEnabled }}
  # Cilium agent exec — runs cilium-dbg status for deep diagnostics
  # Cluster-wide scope: pod listing already requires cluster-wide pods:list.
  # Application-level controls (label validation, namespace allowlist, hardcoded command) provide defense-in-depth.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
{{- end }}
