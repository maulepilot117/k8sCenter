{{- include "kubecenter.validatePlaceholders" . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubecenter.fullname" . }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
rules:
  # Read access for informers (service account's own permissions)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      # secrets are fetched on-demand via impersonated client, not cached in informer.
      # Cluster-wide secret read is an opt-in via rbac.secretsReaderNamespaces
      # (see clusterrole-opt-in.yaml) — finding P1-2 of 2026-05-22 security audit.
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - events
      - resourcequotas
      - limitranges
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # RBAC viewer (read-only)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  # Storage — CSI drivers, storage classes (informer-cached, cluster-scoped)
  - apiGroups: ["storage.k8s.io"]
    resources:
      - csidrivers
      - storageclasses
      - csinodes
    verbs: ["get", "list", "watch"]
  # VolumeSnapshot CRDs (dynamic client, conditional on CRD existence)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotclasses
    verbs: ["get", "list"]
  # API discovery for CNI/CSI CRD detection
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*"]
    verbs: ["get"]
  # Monitoring discovery — check for Prometheus Operator CRDs and resources
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "prometheuses"]
    verbs: ["list", "get"]
  # Admission webhooks (read-only)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    verbs: ["get", "list", "watch"]
  # Cilium CRDs (dynamic client, conditional on CRD existence)
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumnetworkpolicies
      - ciliumbgpclusterconfigs
      - ciliumbgppeerconfigs
      - ciliumbgpnodeconfigs
      - ciliumnodes
      - ciliumendpoints
    verbs: ["get", "list", "watch"]
  # GitOps CRDs (dynamic informers for real-time WebSocket updates)
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["list", "watch"]
  # Policy CRDs (dynamic informers for real-time WebSocket updates)
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies", "policies"]
    verbs: ["list", "watch"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["list", "watch"]
  - apiGroups: ["templates.gatekeeper.sh"]
    resources: ["constrainttemplates"]
    verbs: ["list", "watch"]
  # Service Mesh CRDs — Istio (networking + security) and Linkerd
  # (linkerd.io + policy.linkerd.io). The discoverer + cache layer in
  # `internal/servicemesh` runs as the service account: it lists CRDs
  # cluster-wide on a 30s cycle, then handlers apply per-user RBAC via
  # SelfSubjectAccessReview before returning data. Detail reads and the
  # topology overlay's per-user filtering use the impersonated client
  # — no SA grant needed for those paths.
  - apiGroups: ["networking.istio.io"]
    resources:
      - virtualservices
      - destinationrules
      - gateways
      - serviceentries
    verbs: ["list", "watch"]
  - apiGroups: ["security.istio.io"]
    resources:
      - peerauthentications
      - authorizationpolicies
    verbs: ["list", "watch"]
  - apiGroups: ["linkerd.io"]
    resources:
      - serviceprofiles
    verbs: ["list", "watch"]
  - apiGroups: ["policy.linkerd.io"]
    resources:
      - servers
      - httproutes
      - authorizationpolicies
      - meshtlsauthentications
    verbs: ["list", "watch"]
  # External Secrets Operator (ESO) CRDs — explicit list/watch grants for
  # the discoverer + 30s cache layer in `internal/externalsecrets`. Detail
  # reads use the impersonated client (which the API server RBACs against
  # the requesting user), so no `get` grant is needed here. Write actions
  # (force-sync, bulk refresh — Phase E) impersonate as well.
  - apiGroups: ["external-secrets.io"]
    resources:
      - externalsecrets
      - clusterexternalsecrets
      - secretstores
      - clustersecretstores
      - pushsecrets
    verbs: ["list", "watch"]
  # cert-manager CRDs — list/watch for the discoverer + expiry poller in
  # `internal/certmanager`. Threshold annotations, renew/reissue, and
  # detail reads use the impersonated client.
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - issuers
      - clusterissuers
    verbs: ["list", "watch"]
  # Gateway API CRDs — list for the discoverer + 30s cache in
  # `internal/gateway`. fetchAll lists these cluster-wide as the service
  # account; handlers then apply per-user RBAC via SelfSubjectAccessReview
  # before returning data. Detail reads use the impersonated client, so no
  # `get` grant is needed here. TCP/TLS/UDP routes live in v1alpha2 but RBAC
  # is version-agnostic, so the single group grant covers every version.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gatewayclasses
      - gateways
      - httproutes
      - grpcroutes
      - tcproutes
      - tlsroutes
      - udproutes
    verbs: ["list", "watch"]
  # Velero CRDs — list for the discoverer + 30s cache in `internal/velero`.
  # The dashboard lists these cluster-wide as the service account, then applies
  # per-user RBAC via SelfSubjectAccessReview. Backup/restore/schedule write
  # actions and detail reads use the impersonated client.
  - apiGroups: ["velero.io"]
    resources:
      - backups
      - restores
      - schedules
      - backupstoragelocations
      - volumesnapshotlocations
      - deletebackuprequests
      - downloadrequests
    verbs: ["list", "watch"]
  # Trivy / Aqua Security CRDs — list for the scanning observatory in
  # `internal/scanning`. VulnerabilityReports are listed as the service account
  # (with an SSAR precheck) for the namespace-scoped vulnerability view.
  - apiGroups: ["aquasecurity.github.io"]
    resources:
      - vulnerabilityreports
    verbs: ["list", "watch"]
  # Kubescape CRDs — list for the scanning observatory in `internal/scanning`.
  # VulnerabilitySummaries are listed as the service account (with an SSAR
  # precheck); the Kubescape counterpart to Trivy's VulnerabilityReports.
  - apiGroups: ["spdx.softwarecomposition.org"]
    resources:
      - vulnerabilitysummaries
    verbs: ["list", "watch"]
  # Flux Notification CRDs — list for the notification surface in
  # `internal/notification`. Providers/Alerts/Receivers are listed as the
  # service account; creates/updates use the impersonated client.
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources:
      - providers
      - alerts
      - receivers
    verbs: ["list", "watch"]
  # CRD discovery — list/watch CustomResourceDefinitions for Extensions Hub.
  # The CRDDiscovery informer (internal/k8s/crd_discovery.go) uses the
  # apiextensions typed client — not a dynamic wildcard list. The SA needs
  # CRD list/watch so the informer can build its inventory; subsequent
  # instance counts use per-GVR dynClient.Resource(gvr).List() calls that
  # are each gated by the explicit CRD group grants above.
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  # CHART INVARIANT — CRD instance counts for the Extensions Hub.
  # The SA lists instances only for the CRD groups k8sCenter has typed
  # integrations for. Actual CRUD uses the impersonated client.
  # Groups covered below and why each needs list:
  #   argoproj.io              → Argo CD Application counts
  #   kustomize.toolkit.fluxcd.io → Flux Kustomization counts
  #   helm.toolkit.fluxcd.io   → Flux HelmRelease counts
  #   kyverno.io               → Kyverno Policy / ClusterPolicy counts
  #   wgpolicyk8s.io           → PolicyReport / ClusterPolicyReport counts
  #   templates.gatekeeper.sh  → Gatekeeper ConstraintTemplate counts
  #   constraints.gatekeeper.sh → Gatekeeper Constraint instance counts
  #   networking.istio.io      → Istio VirtualService / Gateway / etc counts
  #   security.istio.io        → Istio PeerAuthentication / AuthorizationPolicy counts
  #   linkerd.io               → Linkerd ServiceProfile counts
  #   policy.linkerd.io        → Linkerd Server / HTTPRoute counts
  #   external-secrets.io      → ESO ExternalSecret / SecretStore etc counts
  #   cert-manager.io          → cert-manager Certificate / Issuer counts
  #   gateway.networking.k8s.io → Gateway API Gateway / HTTPRoute / etc counts
  #   velero.io                → Velero Backup / Restore / Schedule counts
  #   aquasecurity.github.io   → Trivy VulnerabilityReport counts
  #   spdx.softwarecomposition.org → Kubescape VulnerabilitySummary counts
  #   notification.toolkit.fluxcd.io → Flux Provider / Alert / Receiver counts
  #   cilium.io                → Cilium CNI resource counts
  #   snapshot.storage.k8s.io  → VolumeSnapshot counts
  #   monitoring.coreos.com    → ServiceMonitor / Prometheus counts
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["list"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["list"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["list"]
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies", "policies", "clusteradmissionreports", "admissionreports"]
    verbs: ["list"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["list"]
  - apiGroups: ["templates.gatekeeper.sh"]
    resources: ["constrainttemplates"]
    verbs: ["list"]
  - apiGroups: ["constraints.gatekeeper.sh"]
    resources: ["*"]
    verbs: ["list"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries"]
    verbs: ["list"]
  - apiGroups: ["security.istio.io"]
    resources: ["peerauthentications", "authorizationpolicies"]
    verbs: ["list"]
  - apiGroups: ["linkerd.io"]
    resources: ["serviceprofiles"]
    verbs: ["list"]
  - apiGroups: ["policy.linkerd.io"]
    resources: ["servers", "httproutes", "authorizationpolicies", "meshtlsauthentications"]
    verbs: ["list"]
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets", "clusterexternalsecrets", "secretstores", "clustersecretstores", "pushsecrets"]
    verbs: ["list"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers", "clusterissuers"]
    verbs: ["list"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways", "httproutes", "grpcroutes", "tcproutes", "tlsroutes", "udproutes"]
    verbs: ["list"]
  - apiGroups: ["velero.io"]
    resources: ["backups", "restores", "schedules", "backupstoragelocations", "volumesnapshotlocations", "deletebackuprequests", "downloadrequests"]
    verbs: ["list"]
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports"]
    verbs: ["list"]
  - apiGroups: ["spdx.softwarecomposition.org"]
    resources: ["vulnerabilitysummaries"]
    verbs: ["list"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources: ["providers", "alerts", "receivers"]
    verbs: ["list"]
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies", "ciliumbgpclusterconfigs", "ciliumbgppeerconfigs", "ciliumbgpnodeconfigs", "ciliumnodes", "ciliumendpoints"]
    verbs: ["list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots", "volumesnapshotclasses", "volumesnapshotcontents"]
    verbs: ["list"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "prometheuses", "prometheusrules", "alertmanagers"]
    verbs: ["list"]
  # SelfSubjectAccessReview for RBAC filtering
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
{{- if .Values.ciliumAgent.execEnabled }}
  # Cilium agent exec — runs cilium-dbg status for deep diagnostics
  # Cluster-wide scope: pod listing already requires cluster-wide pods:list.
  # Application-level controls (label validation, namespace allowlist, hardcoded command) provide defense-in-depth.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
{{- end }}
