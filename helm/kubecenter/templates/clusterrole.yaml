apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubecenter.fullname" . }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
rules:
  # Impersonation — allows backend to impersonate users for RBAC enforcement
  - apiGroups: [""]
    resources: ["users", "groups", "serviceaccounts"]
    verbs: ["impersonate"]
  # Read access for informers (service account's own permissions)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - configmaps
      # secrets are fetched on-demand via impersonated client, not cached in informer
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - events
      - resourcequotas
      - limitranges
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # RBAC viewer (read-only)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - clusterroles
      - rolebindings
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  # Storage — CSI drivers, storage classes (informer-cached, cluster-scoped)
  - apiGroups: ["storage.k8s.io"]
    resources:
      - csidrivers
      - storageclasses
      - csinodes
    verbs: ["get", "list", "watch"]
  # VolumeSnapshot CRDs (dynamic client, conditional on CRD existence)
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources:
      - volumesnapshots
      - volumesnapshotclasses
    verbs: ["get", "list"]
  # API discovery for CNI/CSI CRD detection
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*"]
    verbs: ["get"]
  # Monitoring discovery — check for Prometheus Operator CRDs and resources
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["servicemonitors", "prometheuses"]
    verbs: ["list", "get"]
  # Admission webhooks (read-only)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - validatingwebhookconfigurations
      - mutatingwebhookconfigurations
    verbs: ["get", "list", "watch"]
  # Cilium CRDs (dynamic client, conditional on CRD existence)
  - apiGroups: ["cilium.io"]
    resources:
      - ciliumnetworkpolicies
      - ciliumbgpclusterconfigs
      - ciliumbgppeerconfigs
      - ciliumbgpnodeconfigs
      - ciliumnodes
      - ciliumendpoints
    verbs: ["get", "list", "watch"]
  # GitOps CRDs (dynamic informers for real-time WebSocket updates)
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources: ["helmreleases"]
    verbs: ["list", "watch"]
  # Policy CRDs (dynamic informers for real-time WebSocket updates)
  - apiGroups: ["kyverno.io"]
    resources: ["clusterpolicies", "policies"]
    verbs: ["list", "watch"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["list", "watch"]
  - apiGroups: ["templates.gatekeeper.sh"]
    resources: ["constrainttemplates"]
    verbs: ["list", "watch"]
  # CRD discovery — list/watch CustomResourceDefinitions for Extensions Hub
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list", "watch"]
  # CRD instance counts — service account lists instances for cached counts
  # displayed on the Extensions Hub. Actual CRUD uses impersonated client.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["list"]
  # SelfSubjectAccessReview for RBAC filtering
  - apiGroups: ["authorization.k8s.io"]
    resources: ["selfsubjectaccessreviews"]
    verbs: ["create"]
{{- if .Values.ciliumAgent.execEnabled }}
  # Cilium agent exec — runs cilium-dbg status for deep diagnostics
  # Cluster-wide scope: pod listing already requires cluster-wide pods:list.
  # Application-level controls (label validation, namespace allowlist, hardcoded command) provide defense-in-depth.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
{{- end }}
