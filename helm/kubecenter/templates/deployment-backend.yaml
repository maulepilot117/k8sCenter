{{- include "kubecenter.validatePlaceholders" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubecenter.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubecenter.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "kubecenter.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubecenter.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 45
      {{- if or .Values.postgresql.enabled .Values.externalDatabase.host }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command: ['sh', '-c']
          args:
            - |
              {{- if .Values.postgresql.enabled }}
              HOST="{{ .Release.Name }}-postgresql"
              {{- else }}
              HOST="{{ .Values.externalDatabase.host }}"
              {{- end }}
              PORT={{ .Values.externalDatabase.port | default 5432 }}
              echo "Waiting for PostgreSQL at $HOST:$PORT..."
              until nc -z -w2 "$HOST" "$PORT"; do
                echo "PostgreSQL not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "kubecenter.fullname" . }}-config
          env:
            # Go runtime tuning
            {{- if .Values.backend.goMemLimit }}
            - name: GOMEMLIMIT
              value: {{ .Values.backend.goMemLimit | quote }}
            {{- end }}
            # Secrets — always from the app Secret
            - name: KUBECENTER_AUTH_JWTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: jwt-secret
            {{- if or .Values.postgresql.enabled .Values.externalDatabase.host }}
            - name: KUBECENTER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: database-url
            {{- end }}
            {{- if or .Values.auth.setupToken (not .Values.backend.config.dev) }}
            - name: KUBECENTER_AUTH_SETUPTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: setup-token
            {{- end }}
            {{- if .Values.alerting.enabled }}
            - name: KUBECENTER_ALERTING_WEBHOOKTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: alerting-webhook-token
            {{- if .Values.alerting.smtp.username }}
            - name: KUBECENTER_ALERTING_SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: smtp-username
            {{- end }}
            {{- if .Values.alerting.smtp.password }}
            - name: KUBECENTER_ALERTING_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: smtp-password
            {{- end }}
            {{- end }}
            {{- if .Values.monitoring.grafana.apiToken }}
            {{- /* Deprecated: backward-compat single token → KUBECENTER_MONITORING_GRAFANATOKEN (viewer-only) */}}
            - name: KUBECENTER_MONITORING_GRAFANATOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" . }}
                  key: grafana-api-token
            {{- end }}
            {{- if and .Values.monitoring.grafana.viewerTokenSecret.name .Values.monitoring.grafana.viewerTokenSecret.key }}
            - name: KUBECENTER_MONITORING_GRAFANAVIEWERTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.monitoring.grafana.viewerTokenSecret.name }}
                  key: {{ .Values.monitoring.grafana.viewerTokenSecret.key }}
            {{- end }}
            {{- if and .Values.monitoring.grafana.provisioningTokenSecret.name .Values.monitoring.grafana.provisioningTokenSecret.key }}
            - name: KUBECENTER_MONITORING_GRAFANAPROVISIONINGTOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.monitoring.grafana.provisioningTokenSecret.name }}
                  key: {{ .Values.monitoring.grafana.provisioningTokenSecret.key }}
            {{- end }}
            {{- range $i, $provider := .Values.auth.oidc }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_ID
              value: {{ $provider.id | quote }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_DISPLAYNAME
              value: {{ $provider.displayName | quote }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_ISSUERURL
              value: {{ $provider.issuerURL | quote }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_CLIENTID
              value: {{ $provider.clientID | quote }}
            {{- if $provider.clientSecret }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" $ }}
                  key: oidc-{{ $provider.id }}-client-secret
            {{- end }}
            - name: KUBECENTER_AUTH_OIDC_{{ $i }}_REDIRECTURL
              value: {{ $provider.redirectURL | quote }}
            {{- end }}
            {{- range $i, $provider := .Values.auth.ldap }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_ID
              value: {{ $provider.id | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_DISPLAYNAME
              value: {{ $provider.displayName | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_URL
              value: {{ $provider.url | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_BINDDN
              value: {{ $provider.bindDN | quote }}
            {{- if $provider.bindPassword }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_BINDPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubecenter.fullname" $ }}
                  key: ldap-{{ $provider.id }}-bind-password
            {{- end }}
            # P3-1 (2026-05-22 audit) TLS posture — the new
            # `auth.ldap[].insecureplaintext` opt-in pairs with the
            # existing starttls / tlsinsecure / cacertpath knobs to
            # let an operator clear the Phase 7 plaintext-bind gate
            # via Helm values rather than only via a YAML config
            # mount. Previously the chart rendered seven LDAP env
            # vars and silently dropped the rest, so an operator
            # could not set them. Audit finding ADV-1 (Phase 7
            # ce-code-review).
            {{- if $provider.starttls }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_STARTTLS
              value: {{ $provider.starttls | quote }}
            {{- end }}
            {{- if $provider.tlsinsecure }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_TLSINSECURE
              value: {{ $provider.tlsinsecure | quote }}
            {{- end }}
            {{- if $provider.insecureplaintext }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_INSECUREPLAINTEXT
              value: {{ $provider.insecureplaintext | quote }}
            {{- end }}
            {{- if $provider.cacertpath }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_CACERTPATH
              value: {{ $provider.cacertpath | quote }}
            {{- end }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_USERBASEDN
              value: {{ $provider.userBaseDN | quote }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_USERFILTER
              value: {{ $provider.userFilter | quote }}
            {{- if $provider.userAttributes }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_USERATTRIBUTES
              value: {{ join "," $provider.userAttributes | quote }}
            {{- end }}
            {{- if $provider.groupBaseDN }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_GROUPBASEDN
              value: {{ $provider.groupBaseDN | quote }}
            {{- end }}
            {{- if $provider.groupFilter }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_GROUPFILTER
              value: {{ $provider.groupFilter | quote }}
            {{- end }}
            {{- if $provider.groupNameAttr }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_GROUPNAMEATTR
              value: {{ $provider.groupNameAttr | quote }}
            {{- end }}
            {{- if $provider.usernameMapAttr }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_USERNAMEMAPATTR
              value: {{ $provider.usernameMapAttr | quote }}
            {{- end }}
            {{- if $provider.groupsPrefix }}
            - name: KUBECENTER_AUTH_LDAP_{{ $i }}_GROUPSPREFIX
              value: {{ $provider.groupsPrefix | quote }}
            {{- end }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 20
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
