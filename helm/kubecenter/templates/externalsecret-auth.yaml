{{- /*
Optional ExternalSecret that materializes `auth.existingSecret` from an external
secret manager (e.g. HashiCorp Vault) via the External Secrets Operator, instead
of that Secret being hand-applied out-of-band. Disabled by default so the chart
stays portable and has no hard dependency on ESO. When enabled, the operator
creates/adopts the Secret named `auth.existingSecret`, populating every key found
at `auth.externalSecret.key` in the store (jwt-secret, database-url, setup-token,
grafana-api-token, ...). Requires ESO and a (Cluster)SecretStore to already exist.
This is app runtime config, not a repo credential, so it is safe in the synced path.
*/}}
{{- if .Values.auth.externalSecret.enabled }}
{{- $target := .Values.auth.existingSecret | required "auth.externalSecret.enabled=true requires auth.existingSecret (the target Secret name)" }}
{{- $es := .Values.auth.externalSecret }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $target }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $es.secretStore.name | required "auth.externalSecret.secretStore.name is required when auth.externalSecret.enabled=true" }}
    kind: {{ $es.secretStore.kind | default "ClusterSecretStore" }}
  target:
    name: {{ $target }}
    creationPolicy: Owner
    # Explicit API default — keep it set so ArgoCD doesn't report perpetual drift
    # against the server-defaulted field.
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: {{ $es.key | required "auth.externalSecret.key is required when auth.externalSecret.enabled=true" }}
        # Explicit API defaults (avoids ArgoCD drift against server-applied values).
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
