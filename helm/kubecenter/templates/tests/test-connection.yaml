apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kubecenter.fullname" . }}-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubecenter.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: test-backend
      image: busybox:1.37
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
      command:
        - /bin/sh
        - -c
        - |
          echo "Testing backend health..."
          wget -qO- http://{{ include "kubecenter.fullname" . }}-backend:{{ .Values.service.port }}/healthz || exit 1
          echo "Testing backend readiness..."
          wget -qO- http://{{ include "kubecenter.fullname" . }}-backend:{{ .Values.service.port }}/readyz || exit 1
          echo "All tests passed."
