version: 2

# P3-9 (2026-05-22 audit): dependabot keeps the SHA pins added in
# Phase 7 fresh. Hand-pinning actions stops mutable tags from being
# silently rewritten under us; dependabot keeps the pins from rotting
# without an operator having to chase every action release manually.
# The 7-day supply-chain cooldown in CLAUDE.md still applies — the PR
# reviewer must confirm each bumped action is at least 7 days old
# before merging.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(actions)
    labels:
      - dependencies
      - github-actions
    # Group every action bump into one weekly PR so the cooldown
    # review happens in one place rather than across N parallel PRs.
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(backend)
    labels:
      - dependencies
      - go
    # Hold k8s.io/* together — bumping them piecemeal usually breaks
    # the build because client-go pins apimachinery and friends.
    groups:
      k8s:
        patterns:
          - "k8s.io/*"
      golang-x:
        patterns:
          - "golang.org/x/*"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore(docker)
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: chore(docker)
    labels:
      - dependencies
      - docker
