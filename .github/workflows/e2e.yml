name: E2E Tests

on:
  pull_request:
    branches: [main]
    # E2E exercises only the web frontend + backend + Helm chart against a
    # kind cluster. Skip when a PR touches none of those — running the
    # 5–6m suite on mobile-only or docs-only diffs burns CI for no signal.
    paths-ignore:
      - 'mobile/**'
      - 'plans/**'
      - 'docs/**'
      - '**/*.md'
      - 'CLAUDE.md'
      - '.github/CODEOWNERS'
  workflow_dispatch:

# Deny by default — each job declares minimum permissions
permissions: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: k8scenter
          POSTGRES_PASSWORD: k8scenter
          POSTGRES_DB: k8scenter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U k8scenter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "~2"

      - name: Install frontend dependencies
        working-directory: frontend
        run: deno install

      - name: Build frontend
        working-directory: frontend
        run: deno task build

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: e2e
          config: e2e/kind-config.yaml
          wait: 120s

      - name: Apply test RBAC
        run: kubectl apply -f e2e/fixtures/k8s/

      - name: Build backend binary
        working-directory: backend
        run: go build -o bin/kubecenter ./cmd/kubecenter

      - name: Install npm dependencies
        working-directory: e2e
        run: npm ci

      # Cache the Playwright browser binaries (~/.cache/ms-playwright) keyed on
      # the lockfile, so the ~120MB Chromium download only happens when the
      # Playwright version actually changes. The recurring "Install Playwright"
      # hangs that blew the 30m job ceiling were re-downloading this every run.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/package-lock.json') }}

      # Install only the Chromium browser binary — NOT --with-deps. GitHub's
      # ubuntu-latest runner image already ships every shared library Chromium
      # needs, so the apt step `--with-deps`/`install-deps` triggers is pure
      # overhead — and it was the actual hang: dpkg trigger processing stalled
      # mid-install and blew first the 30m job ceiling, then the 8m step probe.
      # With the binary cached this is a fast no-op on hits. The per-step
      # timeout stays as a fail-fast backstop against a cold-cache download hang.
      - name: Install Playwright browser
        working-directory: e2e
        timeout-minutes: 6
        run: npx playwright install chromium

      - name: Run E2E tests
        working-directory: e2e
        env:
          CI: "true"
          E2E_BACKEND_COMMAND: "../backend/bin/kubecenter --config ''"
          KUBECENTER_DATABASE_URL: "postgresql://k8scenter:k8scenter@localhost:5432/k8scenter?sslmode=disable"
        run: npx playwright test

      - name: Cleanup orphaned E2E resources
        if: ${{ !cancelled() }}
        run: |
          kubectl delete all,configmaps,secrets,pvc,rolebindings,clusterrolebindings \
            -l e2e=true --all-namespaces --ignore-not-found || true

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7
