name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: k8scenter
          POSTGRES_PASSWORD: k8scenter
          POSTGRES_DB: k8scenter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U k8scenter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "~2"

      - name: Install frontend dependencies
        working-directory: frontend
        run: deno install

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: e2e
          config: e2e/kind-config.yaml
          wait: 120s

      - name: Apply test RBAC
        run: kubectl apply -f e2e/fixtures/k8s/

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        env:
          CI: "true"
        run: npx playwright test

      - name: Cleanup orphaned E2E resources
        if: ${{ !cancelled() }}
        run: |
          kubectl delete all,configmaps,secrets,pvc,rolebindings,clusterrolebindings \
            -l e2e=true --all-namespaces --ignore-not-found || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7
