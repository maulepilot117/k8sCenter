name: E2E Tests

on:
  pull_request:
    branches: [main]
    # E2E exercises only the web frontend + backend + Helm chart against a
    # kind cluster. Skip when a PR touches none of those — running the
    # 5–6m suite on mobile-only or docs-only diffs burns CI for no signal.
    paths-ignore:
      - 'mobile/**'
      - 'plans/**'
      - 'docs/**'
      - '**/*.md'
      - 'CLAUDE.md'
      - '.github/CODEOWNERS'
  workflow_dispatch:

# Deny by default — each job declares minimum permissions
permissions: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: k8scenter
          POSTGRES_PASSWORD: k8scenter
          POSTGRES_DB: k8scenter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U k8scenter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: backend/go.mod
          cache: true

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: "~2"

      - name: Install frontend dependencies
        working-directory: frontend
        run: deno install

      - name: Build frontend
        working-directory: frontend
        run: deno task build

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
        with:
          cluster_name: e2e
          config: e2e/kind-config.yaml
          wait: 120s

      - name: Apply test RBAC
        run: kubectl apply -f e2e/fixtures/k8s/

      - name: Build backend binary
        working-directory: backend
        run: go build -o bin/kubecenter ./cmd/kubecenter

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: e2e
        env:
          CI: "true"
          E2E_BACKEND_COMMAND: "../backend/bin/kubecenter --config ''"
          KUBECENTER_DATABASE_URL: "postgresql://k8scenter:k8scenter@localhost:5432/k8scenter?sslmode=disable"
        run: npx playwright test

      - name: Cleanup orphaned E2E resources
        if: ${{ !cancelled() }}
        run: |
          kubectl delete all,configmaps,secrets,pvc,rolebindings,clusterrolebindings \
            -l e2e=true --all-namespaces --ignore-not-found || true

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload traces on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 7
