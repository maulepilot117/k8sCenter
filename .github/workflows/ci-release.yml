name: CI Release

on:
  push:
    branches: [main]

# Deny by default — each job declares minimum permissions
permissions: {}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            code:
              - 'backend/**'
              - 'frontend/**'

  version-tag:
    name: Version Tag
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: resolve
        run: |
          # Read appVersion from Chart.yaml
          CHART_VERSION=$(grep '^appVersion:' helm/kubecenter/Chart.yaml | sed 's/appVersion: *"\?\([^"]*\)"\?/\1/')
          echo "Chart appVersion: ${CHART_VERSION}"

          # Check if tag already exists for this version
          if git rev-parse "v${CHART_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${CHART_VERSION} already exists, falling back to auto-bump"
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
            fi
            MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          else
            VERSION="${CHART_VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: v${VERSION}"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.resolve.outputs.tag }}"
          git push origin "${{ steps.resolve.outputs.tag }}"

  build-backend-image:
    name: Build Backend Release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    needs: [changes, version-tag]
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "commit=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build amd64 image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: k8scenter-backend:scan
          build-args: |
            VERSION=${{ needs.version-tag.outputs.tag }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=backend

      - name: Scan backend image with Trivy
        # P3-9 (2026-05-22 audit): release scans gate the build. The
        # combination of severity=CRITICAL,HIGH + ignore-unfixed=true +
        # exit-code=1 fails the workflow on any fixable critical/high
        # CVE while leaving unfixable advisories surfaced as SARIF
        # without blocking. Accepted residual findings belong in
        # .trivyignore (created on demand when the first allowlisted
        # CVE shows up) — the audit's "reviewed allowlists" guidance.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: k8scenter-backend:scan
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: ".trivyignore"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Build & push backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/k8scenter-backend:${{ needs.version-tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/k8scenter-backend:sha-${{ steps.meta.outputs.commit }}
            ghcr.io/${{ github.repository_owner }}/k8scenter-backend:latest
          build-args: |
            VERSION=${{ needs.version-tag.outputs.tag }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Set package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api users/${{ github.repository_owner }}/packages/container/k8scenter-backend \
            --method PATCH --field visibility=public || true

  build-frontend-image:
    name: Build Frontend Release Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    needs: [changes, version-tag]
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "commit=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build amd64 image for scanning
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: k8scenter-frontend:scan
          cache-from: type=gha,scope=frontend

      - name: Scan frontend image with Trivy
        # P3-9 (2026-05-22 audit): release scans gate the build. See
        # the matching backend-image step above for the policy detail.
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: k8scenter-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: ".trivyignore"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

      - name: Build & push frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/k8scenter-frontend:${{ needs.version-tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/k8scenter-frontend:sha-${{ steps.meta.outputs.commit }}
            ghcr.io/${{ github.repository_owner }}/k8scenter-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Set package visibility to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api users/${{ github.repository_owner }}/packages/container/k8scenter-frontend \
            --method PATCH --field visibility=public || true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [version-tag, build-backend-image, build-frontend-image]
    if: |
      always() &&
      needs.version-tag.result == 'success' &&
      !contains(needs.*.result, 'failure')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.version-tag.outputs.tag }}" \
            --title "${{ needs.version-tag.outputs.tag }}" \
            --generate-notes
