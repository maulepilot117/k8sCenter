name: CI

on:
  pull_request:
    branches: [main]

# Deny by default — each job declares minimum permissions
permissions: {}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            helm:
              - 'helm/**'

  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # P2-11 (2026-05-22 audit): pin to 1.26.3 to clear the
          # reachable govulncheck advisories landed in stdlib at that
          # patch — staying on the "1.26" floating prefix would lag
          # the security patch on CI runners cached from an earlier
          # minor.
          go-version: "1.26.3"
          cache-dependency-path: backend/go.sum

      - name: Check cluster-routing discipline
        # P2-5: fail any handler that calls .ClientForUser / .DynamicClientForUser
        # directly instead of routing through ClusterRouter.
        # warn mode during Phase 2 soak — flip to "fail" in a follow-up PR.
        working-directory: ${{ github.workspace }}
        env:
          CHECK_CLUSTER_ROUTING_GATE: warn  # flip to "fail" after Phase 2 rewrites land
        run: bash scripts/check-cluster-routing.sh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -cover -count=1

      - name: Build
        run: go build -o /dev/null ./cmd/kubecenter

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install

      - name: Lint
        run: deno lint

      - name: Format check
        run: deno fmt --check

      - name: Type check
        run: deno check

      - name: Build
        run: deno task build

  rbac-guard:
    name: ClusterRole CRD grants
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [changes]
    # Run when either side of the contract moves: a backend change can add a
    # new SA-listed CRD group, and a helm change can drop a grant. Either alone
    # can reintroduce the #305 -> #326 regression.
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.helm == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check ClusterRole covers service-account-listed CRD groups
        # Fails if a CRD-discovered feature lists resources as the service
        # account (BaseDynamicClient) but the Helm ClusterRole is missing the
        # matching apiGroup grant — which makes the feature dashboard 500
        # wherever those CRDs are installed (root cause of #326).
        run: bash scripts/check-clusterrole-crd-grants.sh

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run actionlint
        # actionlint catches workflow YAML syntax errors and
        # expression-language mistakes (typos in needs.<job>.outputs,
        # unknown contexts, etc.) before push-to-main. Runs on every
        # PR — not gated on path filters since workflow changes can
        # land in any PR.
        #
        # P3-9 (2026-05-22 audit): pin the download script to the
        # rhysd/actionlint v1.7.5 commit SHA rather than reading it
        # from the floating `main` branch — a malicious push to main
        # of that repo would otherwise execute arbitrary code under
        # GITHUB_TOKEN. The script then installs actionlint 1.7.5
        # itself, which is a separate signed release.
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/e11169d0656294827d65370a3c76a2325406da85/scripts/download-actionlint.bash) 1.7.5
          ./actionlint -color

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [changes]
    if: needs.changes.outputs.helm == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: "v3.16.2"

      - name: helm lint
        run: helm lint helm/kubecenter

      # Add subchart repos before `helm dependency build` (the OCI
      # bitnamicharts registry doesn't need an explicit `repo add`).
      - name: helm repo add
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      # Render the chart with Universal Link wiring enabled so the
      # well-known.yaml template's fail-fast guards and resource
      # outputs are exercised. helm dependency build pulls subcharts
      # so template render doesn't fail on missing deps.
      - name: helm dependency build
        run: helm dependency build helm/kubecenter

      - name: helm template — Universal Links enabled
        run: |
          helm template kubecenter helm/kubecenter \
            --set mobile.universalLinkDomain=test.example.com \
            --set mobile.iosTeamId=ABCDE12345 \
            --set mobile.androidSha256CertFingerprint=AB:CD:EF \
            --set ingress.enabled=true \
            --set 'ingress.tls[0].secretName=kubecenter-tls' \
            --set 'ingress.tls[0].hosts[0]=test.example.com' \
            > /dev/null

      # Default render (Universal Links disabled) must also succeed —
      # well-known.yaml should emit nothing in this branch.
      - name: helm template — defaults
        run: helm template kubecenter helm/kubecenter > /dev/null
