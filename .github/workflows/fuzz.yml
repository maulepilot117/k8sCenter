name: Fuzz

on:
  schedule:
    - cron: "0 4 * * *" # nightly 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pkg: ./internal/loki/, target: FuzzEnforceNamespaces }
          - { pkg: ./internal/k8s/, target: FuzzCheckIPNotPrivate }
          - { pkg: ./internal/k8s/, target: FuzzValidateRemoteURLContext }
          - { pkg: ./internal/gitops/, target: FuzzParseCompositeID }
          - { pkg: ./internal/servicemesh/, target: FuzzParseMeshCompositeID }
    name: ${{ matrix.target }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.3"
          cache-dependency-path: backend/go.sum
      - name: Fuzz ${{ matrix.target }}
        run: go test ${{ matrix.pkg }} -run=^$ -fuzz=^${{ matrix.target }}$ -fuzztime=5m
      - name: Show crash reproducer on failure
        if: failure()
        run: |
          echo "Fuzz target ${{ matrix.target }} failed. Crash reproducers (if any):"
          find . -path '*/testdata/fuzz/${{ matrix.target }}/*' -type f -print -exec cat {} \; || true
