name: Mobile CI

# Mobile CI runs analyze + test on every PR/push that touches mobile/
# or shared/themes/. PR-1g adds the `deploy_ios` and `deploy_android`
# jobs that upload to TestFlight and Play Internal on push-to-main.
# Both jobs gate on the analyze job and short-circuit when their
# required secrets are absent — operators who haven't enrolled in the
# Apple Developer Program or set up Play Console see a clear "secrets
# missing" skip rather than a hard failure. `workflow_dispatch` lets
# operators manually re-trigger a release after a transient upload
# failure without forcing a dummy commit.

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/themes/**"
      - "tools/theme-gen/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - "shared/themes/**"
      - "tools/theme-gen/**"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:

# Deny-by-default GITHUB_TOKEN permissions, mirroring ci.yml. Each
# job below grants only the minimum it needs (typically contents:read
# for checkout). Read-only is sufficient — none of these jobs commit,
# push, or comment on PRs.
permissions: {}

jobs:
  analyze:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Pin Flutter to the version listed in mobile/pubspec.yaml's
      # environment.flutter constraint (3.41.x stable channel).
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: flutter analyze
        working-directory: mobile
        run: flutter analyze

      - name: flutter test
        working-directory: mobile
        run: flutter test

  themes-parity:
    name: Theme generator parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Verify themes are in sync
        run: deno run --allow-read tools/theme-gen/main.ts --check

  # ---------------------------------------------------------------------
  # Security scans — Semgrep SAST + OSV-Scanner dependency check fill
  # the role CodeQL plays for the Go/JS halves of the project (CodeQL
  # has no Dart analyzer). Findings upload as SARIF to the Security
  # tab; neither job is blocking on day 1 so PRs surface issues
  # without gating the merge. Flip `fail-on-vuln: true` on osv-scan
  # and add `--error` to the semgrep call to harden once the baseline
  # is clean.
  # ---------------------------------------------------------------------

  semgrep:
    name: Semgrep SAST (Dart/Flutter)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pin Semgrep to 1.162.0 — 10 days old at time of write, which
      # clears the 7-day supply-chain cooldown documented in global
      # CLAUDE.md. Newer Semgrep releases land roughly weekly; only
      # bump after the new release ages past the cooldown window.
      # Semgrep's own transitive deps (click, etc.) are installed
      # normally — transitive deps are explicitly exempt from the
      # 7-day rule because the solver picks them, not us.
      - name: Install Semgrep
        run: pip install semgrep==1.162.0

      # Rule selection: Semgrep's open registry has no curated Dart
      # or Flutter pack (the human-facing /p/dart preview page exists
      # but the CLI's config-fetch endpoint 404s, and semgrep silently
      # exits 7 — MISSING_CONFIG — when an unfetchable pack is requested).
      #   p/default — broad multi-language + regex rules; the regex
      #     rules apply to .dart files (credentials, hardcoded URLs,
      #     dangerous patterns) even though semgrep ships no Dart-AST
      #     rule pack.
      #   p/secrets — credential / API-key leak detection across all
      #     file types via regex.
      # OSV-Scanner (separate job below) handles the pub.dev dep-CVE
      # surface, which IS Dart-specific.
      # `--metrics=off` keeps run telemetry off public CI. SARIF
      # output lets `upload-sarif` ingest the findings under the
      # `dart-semgrep` category so they slot into the same Security
      # tab CodeQL writes to without colliding with CodeQL's own
      # categories.
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/secrets \
            --sarif --output=semgrep.sarif \
            --metrics=off \
            --exclude="mobile/build/**" \
            --exclude="mobile/.dart_tool/**" \
            --exclude="mobile/ios/Pods/**" \
            --exclude="mobile/android/.gradle/**" \
            mobile/

      - name: Upload SARIF to Security tab
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: "/language:dart-semgrep"

  osv-scan:
    name: OSV-Scanner (pub.dev advisories)
    # Reusable workflow handles checkout, scan, SARIF generation, and
    # upload to the Security tab. Pinned to v2.3.5 (52 days old) to
    # clear the 7-day cooldown. `fail-on-vuln: false` keeps findings
    # surfaced without blocking PRs until we baseline the existing
    # advisory set.
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.5
    with:
      scan-args: |-
        --lockfile=mobile/pubspec.lock
      fail-on-vuln: false

  mobile-security-summary:
    # Aggregate gate intended as the single required check for branch
    # protection. Passes when both scans either succeeded or were
    # skipped by their path filter; fails on any failure or
    # cancellation. Mirrors the `CodeQL Summary` pattern in
    # .github/workflows/codeql.yml so branch protection treats both
    # security gates identically.
    name: Mobile Security Summary
    runs-on: ubuntu-latest
    needs: [semgrep, osv-scan]
    if: always()
    permissions: {}
    steps:
      - name: Verify all analyses passed or were skipped
        env:
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          OSV_RESULT: ${{ needs.osv-scan.result }}
        run: |
          fail=0
          for name in SEMGREP OSV; do
            var="${name}_RESULT"
            result="${!var}"
            case "$result" in
              success|skipped) ;;
              *) echo "::error::$name analyze result: $result"; fail=1 ;;
            esac
          done
          exit $fail

  # ---------------------------------------------------------------------
  # Release uploads — only run on push-to-main or workflow_dispatch,
  # gated on analyze. Each job auto-skips with a clear status when its
  # required secrets are absent, so operators bring up the pipeline
  # incrementally.
  # ---------------------------------------------------------------------

  deploy_check:
    name: Check deploy secrets
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: [analyze, themes-parity]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      ios_ready: ${{ steps.probe.outputs.ios_ready }}
      android_ready: ${{ steps.probe.outputs.android_ready }}
      release_signing_ready: ${{ steps.probe.outputs.release_signing_ready }}
      backend_url_set: ${{ steps.probe.outputs.backend_url_set }}
    steps:
      - id: probe
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
        run: |
          set -e
          ios_ready=false
          android_ready=false
          if [ -n "$MATCH_GIT_URL" ] && [ -n "$MATCH_PASSWORD" ] && [ -n "$APPSTORE_CONNECT_API_KEY" ]; then
            ios_ready=true
          fi
          if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            android_ready=true
          fi
          release_signing_ready=false
          if [ -n "$ANDROID_UPLOAD_KEYSTORE_BASE64" ] && \
             [ -n "$ANDROID_UPLOAD_KEY_ALIAS" ] && \
             [ -n "$ANDROID_UPLOAD_KEY_PASSWORD" ] && \
             [ -n "$ANDROID_UPLOAD_STORE_PASSWORD" ]; then
            release_signing_ready=true
          fi
          backend_url_set=false
          if [ -n "$BACKEND_URL" ]; then
            backend_url_set=true
          fi
          echo "ios_ready=$ios_ready" >> "$GITHUB_OUTPUT"
          echo "android_ready=$android_ready" >> "$GITHUB_OUTPUT"
          echo "release_signing_ready=$release_signing_ready" >> "$GITHUB_OUTPUT"
          echo "backend_url_set=$backend_url_set" >> "$GITHUB_OUTPUT"
          # Per-platform notices: surface partial-config cases so an
          # operator with iOS configured and Android pending (or vice
          # versa) sees a clear log message rather than silent skip.
          if [ "$ios_ready" = "false" ]; then
            echo "::notice::iOS deploy secrets not configured — deploy_ios skipped. See mobile/docs/RELEASE.md."
          fi
          if [ "$android_ready" = "false" ]; then
            echo "::notice::Android deploy secrets not configured — deploy_android skipped. See mobile/docs/RELEASE.md."
          fi
          # Universal Link host is independent of the per-platform
          # secrets — flag when the platform is configured but the
          # host is missing, since the resulting build will silently
          # ship without working Universal Links.
          if [ "$android_ready" = "true" ] && [ -z "$UNIVERSAL_LINK_HOST" ]; then
            echo "::notice::android_ready but UNIVERSAL_LINK_HOST is empty — Android App Links will not work; only k8scenter:// custom-scheme links resolve."
          fi
          if [ "$ios_ready" = "true" ] && [ -z "$UNIVERSAL_LINK_HOST" ]; then
            echo "::notice::ios_ready but UNIVERSAL_LINK_HOST is empty — iOS Universal Links will not work; only k8scenter:// custom-scheme links resolve."
          fi
          # P1-4: release builds without BACKEND_URL must NOT ship.
          if [ "$ios_ready" = "true" ] && [ "$backend_url_set" = "false" ]; then
            echo "::error::iOS deploy is configured but BACKEND_URL secret is unset. Add an HTTPS BACKEND_URL secret to ship release builds. (Finding P1-4)"
            exit 1
          fi
          if [ "$android_ready" = "true" ] && [ "$backend_url_set" = "false" ]; then
            echo "::error::Android deploy is configured but BACKEND_URL secret is unset. Add an HTTPS BACKEND_URL secret to ship release builds. (Finding P1-4)"
            exit 1
          fi
          # P1-5: Android release builds without upload-signing secrets must NOT ship.
          if [ "$android_ready" = "true" ] && [ "$release_signing_ready" = "false" ]; then
            echo "::error::Android deploy is configured but Android upload signing secrets are incomplete (need all four: ANDROID_UPLOAD_KEYSTORE_BASE64, ANDROID_UPLOAD_KEY_ALIAS, ANDROID_UPLOAD_KEY_PASSWORD, ANDROID_UPLOAD_STORE_PASSWORD). Refusing to ship a debug-signed AAB. (Finding P1-5)"
            exit 1
          fi

  deploy_ios:
    name: TestFlight upload
    if: needs.deploy_check.outputs.ios_ready == 'true' && needs.deploy_check.outputs.backend_url_set == 'true'
    needs: deploy_check
    runs-on: macos-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      # Bundler-cache pulls Fastlane from mobile/fastlane/Gemfile so
      # versions are pinned and reproducible across runs.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: mobile/fastlane

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      # Substitute the operator's Universal Link host into the iOS
      # entitlements file before Fastlane archives. Runner.entitlements
      # ships with an empty applinks array; this step replaces it with
      # `applinks:<host>` when UNIVERSAL_LINK_HOST is set, so every
      # CI-built IPA carries the operator's own associated-domain.
      - name: Substitute Universal Link host into entitlements
        if: ${{ env.UNIVERSAL_LINK_HOST != '' }}
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
        run: |
          plutil -replace com.apple.developer.associated-domains \
            -json "[\"applinks:${UNIVERSAL_LINK_HOST}\"]" \
            mobile/ios/Runner/Runner.entitlements

      # Write the App Store Connect API key from a step env block —
      # passing the secret via env (not via ${{ secrets.X }} in the
      # `run:` body) avoids inlining secret material into the bash
      # command line where shell metacharacters could parse oddly.
      # Restrictive perms (chmod 600) defend the on-disk artifact.
      - name: Write App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"
          printf '%s' "$ASC_KEY" > "$RUNNER_TEMP/keys/asc_api_key.json"
          chmod 600 "$RUNNER_TEMP/keys/asc_api_key.json"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$RUNNER_TEMP/keys/asc_api_key.json" >> "$GITHUB_ENV"

      - name: TestFlight upload
        working-directory: mobile/fastlane
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bundle exec fastlane beta_ios

      - name: Cleanup secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/asc_api_key.json"

  deploy_android:
    name: Play Internal upload
    if: needs.deploy_check.outputs.android_ready == 'true' && needs.deploy_check.outputs.release_signing_ready == 'true'
    needs: deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: mobile/fastlane

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      # P1-5: write the upload-signing key.properties so Gradle's release
      # task can sign with the real upload key. The file is gitignored;
      # CI provisions it from secrets at run time and removes it at the end.
      - name: Write Android upload signing key.properties
        if: needs.deploy_check.outputs.release_signing_ready == 'true'
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          ANDROID_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p mobile/android
          # Decode the keystore to a stable path that the .properties points to.
          keystore_path="$(pwd)/mobile/android/upload-keystore.jks"
          printf '%s' "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 -d > "$keystore_path"
          chmod 600 "$keystore_path"
          printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$keystore_path" \
            "$ANDROID_UPLOAD_STORE_PASSWORD" \
            "$ANDROID_UPLOAD_KEY_ALIAS" \
            "$ANDROID_UPLOAD_KEY_PASSWORD" \
            > mobile/android/key.properties
          chmod 600 mobile/android/key.properties

      # Discrete flutter build step (mirrors deploy_ios) so build
      # failures surface in their own log section rather than buried
      # inside Fastlane's gradle() output. The dart-define plumbs the
      # Universal Link host and backend URL into the app at compile time.
      - name: flutter build appbundle
        working-directory: mobile
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          # versionCode = run_number * 10 + (run_attempt - 1) so
          # re-runs on the same commit produce unique versionCodes.
          # Play rejects duplicate versionCodes unconditionally.
          version_code=$(( GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT - 1 ))
          flutter build appbundle --release \
            --dart-define=UNIVERSAL_LINK_HOST="$UNIVERSAL_LINK_HOST" \
            --dart-define=BACKEND_URL="$BACKEND_URL" \
            -- -PversionCode="$version_code" \
               -PuniversalLinkHost="$UNIVERSAL_LINK_HOST"

      - name: Write Play service account key
        env:
          PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"
          printf '%s' "$PLAY_SA" > "$RUNNER_TEMP/keys/play_sa.json"
          chmod 600 "$RUNNER_TEMP/keys/play_sa.json"
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=$RUNNER_TEMP/keys/play_sa.json" >> "$GITHUB_ENV"

      - name: Play Internal upload
        working-directory: mobile/fastlane
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bundle exec fastlane beta_android

      - name: Cleanup secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/play_sa.json"

      - name: Cleanup Android signing material
        if: always()
        run: |
          rm -f mobile/android/key.properties
          rm -f mobile/android/upload-keystore.jks
