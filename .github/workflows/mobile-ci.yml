name: Mobile CI

# Mobile CI runs analyze + test on every PR/push that touches mobile/
# or shared/themes/. PR-1g adds the `deploy_ios` and `deploy_android`
# jobs that upload to TestFlight and Play Internal on push-to-main.
# Both jobs gate on the analyze job and short-circuit when their
# required secrets are absent — operators who haven't enrolled in the
# Apple Developer Program or set up Play Console see a clear "secrets
# missing" skip rather than a hard failure.

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/themes/**"
      - "tools/theme-gen/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - "shared/themes/**"
      - "tools/theme-gen/**"
      - ".github/workflows/mobile-ci.yml"

jobs:
  analyze:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin Flutter to the version listed in mobile/pubspec.yaml's
      # environment.flutter constraint (3.41.x stable channel).
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: flutter analyze
        working-directory: mobile
        run: flutter analyze

      - name: flutter test
        working-directory: mobile
        run: flutter test

  themes-parity:
    name: Theme generator parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Verify themes are in sync
        run: deno run --allow-read tools/theme-gen/main.ts --check

  # ---------------------------------------------------------------------
  # Release uploads — only run on push-to-main, gated on analyze.
  # Each job auto-skips with a clear status when its required secrets
  # are absent, so operators bring up the pipeline incrementally.
  # ---------------------------------------------------------------------

  deploy_check:
    name: Check deploy secrets
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [analyze, themes-parity]
    runs-on: ubuntu-latest
    outputs:
      ios_ready: ${{ steps.probe.outputs.ios_ready }}
      android_ready: ${{ steps.probe.outputs.android_ready }}
    steps:
      - id: probe
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          ios_ready=false
          android_ready=false
          if [ -n "$MATCH_GIT_URL" ] && [ -n "$MATCH_PASSWORD" ] && [ -n "$APPSTORE_CONNECT_API_KEY" ]; then
            ios_ready=true
          fi
          if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            android_ready=true
          fi
          echo "ios_ready=$ios_ready" >> "$GITHUB_OUTPUT"
          echo "android_ready=$android_ready" >> "$GITHUB_OUTPUT"
          if [ "$ios_ready" = "false" ] && [ "$android_ready" = "false" ]; then
            echo "::notice::No deploy secrets configured — skipping iOS + Android upload. See mobile/docs/RELEASE.md."
          fi

  deploy_ios:
    name: TestFlight upload
    if: needs.deploy_check.outputs.ios_ready == 'true'
    needs: deploy_check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install Fastlane
        run: gem install fastlane bundler --no-document

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: flutter build ios
        working-directory: mobile
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
        run: flutter build ios --release --no-codesign

      - name: Write App Store Connect API key
        run: |
          mkdir -p $RUNNER_TEMP/keys
          printf '%s' "${{ secrets.APPSTORE_CONNECT_API_KEY }}" > "$RUNNER_TEMP/keys/asc_api_key.json"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$RUNNER_TEMP/keys/asc_api_key.json" >> "$GITHUB_ENV"

      - name: TestFlight upload
        working-directory: mobile
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: fastlane beta_ios

      - name: Cleanup secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/asc_api_key.json"

  deploy_android:
    name: Play Internal upload
    if: needs.deploy_check.outputs.android_ready == 'true'
    needs: deploy_check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Fastlane
        run: gem install fastlane bundler --no-document

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Write Play service account key
        run: |
          mkdir -p $RUNNER_TEMP/keys
          printf '%s' "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" > "$RUNNER_TEMP/keys/play_sa.json"
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=$RUNNER_TEMP/keys/play_sa.json" >> "$GITHUB_ENV"

      - name: Play Internal upload
        working-directory: mobile
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: fastlane beta_android

      - name: Cleanup secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/play_sa.json"
