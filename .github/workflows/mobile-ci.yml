name: Mobile CI

# Mobile CI runs analyze + test on every PR/push that touches mobile/
# or shared/themes/. PR-1g adds the `deploy_ios` and `deploy_android`
# jobs that upload to TestFlight and Play Internal on push-to-main.
# Both jobs gate on the analyze job and short-circuit when their
# required secrets are absent — operators who haven't enrolled in the
# Apple Developer Program or set up Play Console see a clear "secrets
# missing" skip rather than a hard failure. `workflow_dispatch` lets
# operators manually re-trigger a release after a transient upload
# failure without forcing a dummy commit.

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/themes/**"
      - "tools/theme-gen/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "mobile/**"
      - "shared/themes/**"
      - "tools/theme-gen/**"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:

# Deny-by-default GITHUB_TOKEN permissions, mirroring ci.yml. Each
# job below grants only the minimum it needs (typically contents:read
# for checkout). Read-only is sufficient — none of these jobs commit,
# push, or comment on PRs.
permissions: {}

jobs:
  analyze:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Pin Flutter to the version listed in mobile/pubspec.yaml's
      # environment.flutter constraint (3.41.x stable channel).
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: flutter analyze
        working-directory: mobile
        run: flutter analyze

      - name: flutter test
        working-directory: mobile
        run: flutter test

  themes-parity:
    name: Theme generator parity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Verify themes are in sync
        run: deno run --allow-read tools/theme-gen/main.ts --check

  # ---------------------------------------------------------------------
  # Release uploads — only run on push-to-main or workflow_dispatch,
  # gated on analyze. Each job auto-skips with a clear status when its
  # required secrets are absent, so operators bring up the pipeline
  # incrementally.
  # ---------------------------------------------------------------------

  deploy_check:
    name: Check deploy secrets
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: [analyze, themes-parity]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      ios_ready: ${{ steps.probe.outputs.ios_ready }}
      android_ready: ${{ steps.probe.outputs.android_ready }}
    steps:
      - id: probe
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPSTORE_CONNECT_API_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
        run: |
          set -e
          ios_ready=false
          android_ready=false
          if [ -n "$MATCH_GIT_URL" ] && [ -n "$MATCH_PASSWORD" ] && [ -n "$APPSTORE_CONNECT_API_KEY" ]; then
            ios_ready=true
          fi
          if [ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]; then
            android_ready=true
          fi
          echo "ios_ready=$ios_ready" >> "$GITHUB_OUTPUT"
          echo "android_ready=$android_ready" >> "$GITHUB_OUTPUT"
          # Per-platform notices: surface partial-config cases so an
          # operator with iOS configured and Android pending (or vice
          # versa) sees a clear log message rather than silent skip.
          if [ "$ios_ready" = "false" ]; then
            echo "::notice::iOS deploy secrets not configured — deploy_ios skipped. See mobile/docs/RELEASE.md."
          fi
          if [ "$android_ready" = "false" ]; then
            echo "::notice::Android deploy secrets not configured — deploy_android skipped. See mobile/docs/RELEASE.md."
          fi
          # Universal Link host is independent of the per-platform
          # secrets — flag when the platform is configured but the
          # host is missing, since the resulting build will silently
          # ship without working Universal Links.
          if [ "$android_ready" = "true" ] && [ -z "$UNIVERSAL_LINK_HOST" ]; then
            echo "::notice::android_ready but UNIVERSAL_LINK_HOST is empty — Android App Links will not work; only k8scenter:// custom-scheme links resolve."
          fi
          if [ "$ios_ready" = "true" ] && [ -z "$UNIVERSAL_LINK_HOST" ]; then
            echo "::notice::ios_ready but UNIVERSAL_LINK_HOST is empty — iOS Universal Links will not work; only k8scenter:// custom-scheme links resolve."
          fi

  deploy_ios:
    name: TestFlight upload
    if: needs.deploy_check.outputs.ios_ready == 'true'
    needs: deploy_check
    runs-on: macos-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      # Bundler-cache pulls Fastlane from mobile/fastlane/Gemfile so
      # versions are pinned and reproducible across runs.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: mobile/fastlane

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      # Substitute the operator's Universal Link host into the iOS
      # entitlements file before Fastlane archives. Runner.entitlements
      # ships with an empty applinks array; this step replaces it with
      # `applinks:<host>` when UNIVERSAL_LINK_HOST is set, so every
      # CI-built IPA carries the operator's own associated-domain.
      - name: Substitute Universal Link host into entitlements
        if: ${{ env.UNIVERSAL_LINK_HOST != '' }}
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
        run: |
          plutil -replace com.apple.developer.associated-domains \
            -json "[\"applinks:${UNIVERSAL_LINK_HOST}\"]" \
            mobile/ios/Runner/Runner.entitlements

      # Write the App Store Connect API key from a step env block —
      # passing the secret via env (not via ${{ secrets.X }} in the
      # `run:` body) avoids inlining secret material into the bash
      # command line where shell metacharacters could parse oddly.
      # Restrictive perms (chmod 600) defend the on-disk artifact.
      - name: Write App Store Connect API key
        env:
          ASC_KEY: ${{ secrets.APPSTORE_CONNECT_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"
          printf '%s' "$ASC_KEY" > "$RUNNER_TEMP/keys/asc_api_key.json"
          chmod 600 "$RUNNER_TEMP/keys/asc_api_key.json"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$RUNNER_TEMP/keys/asc_api_key.json" >> "$GITHUB_ENV"

      - name: TestFlight upload
        working-directory: mobile/fastlane
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bundle exec fastlane beta_ios

      - name: Cleanup secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/asc_api_key.json"

  deploy_android:
    name: Play Internal upload
    if: needs.deploy_check.outputs.android_ready == 'true'
    needs: deploy_check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: mobile/fastlane

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      # Discrete flutter build step (mirrors deploy_ios) so build
      # failures surface in their own log section rather than buried
      # inside Fastlane's gradle() output. The dart-define plumbs the
      # Universal Link host into the DeepLinkHandler at compile time.
      - name: flutter build appbundle
        working-directory: mobile
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          # versionCode = run_number * 10 + (run_attempt - 1) so
          # re-runs on the same commit produce unique versionCodes.
          # Play rejects duplicate versionCodes unconditionally.
          version_code=$(( GITHUB_RUN_NUMBER * 10 + GITHUB_RUN_ATTEMPT - 1 ))
          flutter build appbundle --release \
            --dart-define=UNIVERSAL_LINK_HOST="$UNIVERSAL_LINK_HOST" \
            -- -PversionCode="$version_code" \
               -PuniversalLinkHost="$UNIVERSAL_LINK_HOST"

      - name: Write Play service account key
        env:
          PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          chmod 700 "$RUNNER_TEMP/keys"
          printf '%s' "$PLAY_SA" > "$RUNNER_TEMP/keys/play_sa.json"
          chmod 600 "$RUNNER_TEMP/keys/play_sa.json"
          echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=$RUNNER_TEMP/keys/play_sa.json" >> "$GITHUB_ENV"

      - name: Play Internal upload
        working-directory: mobile/fastlane
        env:
          UNIVERSAL_LINK_HOST: ${{ secrets.UNIVERSAL_LINK_HOST }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: bundle exec fastlane beta_android

      - name: Cleanup secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/keys/play_sa.json"
