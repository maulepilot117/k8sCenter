name: kubecenter
description: "k8sCenter mobile — cross-platform Flutter app for the k8sCenter Kubernetes management platform."
publish_to: 'none'

# build-number is bumped from CI via --build-number=$(git rev-list --count HEAD)
# so every push to main produces a unique TestFlight + Play Internal build.
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ^3.41.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management — Riverpod 2.x with code generation.
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing — declarative, deep-link friendly.
  go_router: ^14.6.2

  # HTTP — Dio with interceptors for auth refresh, X-Cluster-ID injection, error parsing.
  dio: ^5.7.0

  # WebSocket — for /ws/resources, /ws/logs/..., /ws/alerts.
  web_socket_channel: ^3.0.1

  # Secure refresh-token storage — iOS Keychain / Android EncryptedSharedPreferences.
  flutter_secure_storage: ^9.2.2

  # User-preference persistence (active theme id, etc.).
  shared_preferences: ^2.3.3

  # Push notifications — FCM unifies APNS + Android.
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

  # Charts (PR-1f+ Prometheus integration). Listed early so deps resolve consistently.
  fl_chart: ^0.69.0

  # Virtualized DataTable for the tablet resource list. Stock DataTable
  # materializes every row eagerly, which jank-locks 500-pod clusters.
  data_table_2: ^2.5.16

  # In-app browser for OIDC (PR-5c).
  flutter_custom_tabs: ^2.2.0

  # Universal Link / App Link receiver. Surfaces OS-routed deep links
  # (including the OIDC /m/auth/callback redirect from the IdP) as a
  # Stream<Uri> the controller subscribes to. FCM-routed deep links use
  # the separate firebase_messaging plumbing; app_links is the
  # non-notification path. PR-5c.
  app_links: ^6.4.0

  # SHA256 + base64url for PKCE code challenge generation. The sentry
  # SDK pulls crypto in transitively; listing it as a direct dep keeps
  # depend_on_referenced_packages clean. PR-5c.
  crypto: ^3.0.0

  # Crash reporting — opt-in only, default off. Initialized lazily from
  # observability/sentry_init.dart when the sentry_opt_in shared_preferences
  # flag is true AND a DSN is provided via --dart-define=SENTRY_DSN.
  sentry_flutter: ^8.13.0

  # Android FLAG_SECURE for the Secret detail screen (PR-5d). Exact-pinned
  # because the platform-channel surface is small and accidental upgrades on
  # a security primitive are not worth the risk of silent behavioural drift.
  flutter_windowmanager: 0.2.0

  # External URLs from the Settings "About" tiles + the onboarding "How to
  # set up your server" CTA (PR-5g).
  url_launcher: ^6.3.0

  # Version + build-number lookup. Sentry tags events with the release id
  # so the project-level inbound filter can drop events whose release
  # doesn't match the published binary. Also surfaced on the Settings →
  # About row.
  package_info_plus: ^8.0.0

  # Internationalization scaffolding (English only through M5).
  intl: ^0.19.0

  # Immutable data classes + JSON.
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Test-only: directly imported by settings_screen_test.dart to stub
  # the url_launcher platform interface. Brought in transitively by
  # url_launcher above; listed here so `depend_on_referenced_packages`
  # stays clean.
  plugin_platform_interface: ^2.1.0
  url_launcher_platform_interface: ^2.3.0

  # Code generation for Riverpod, Freezed, JSON.
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
